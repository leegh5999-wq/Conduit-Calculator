.mono{font-family:'JetBrains Mono',monospace}
.header{background:#fff;border-bottom:2px solid #d1d5db;padding:14px 16px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:12px}

.header h1{font-size:18px;font-weight:800;color:#111827}
.header p{margin:2px 0 0;font-size:11px;color:#6b7280;font-weight:500}
.container{max-width:1200px;margin:0 auto;padding:12px 12px 40px}
.disclaimer{background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#92400e;line-height:1.7;font-weight:500}
.disclaimer strong{color:#78350f}
.top-tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.top-tab{padding:8px 14px;font-size:12px;font-weight:500;border:2px solid #d1d5db;border-radius:8px;color:#374151;background:#fff}

.card{background:#fff;border:1px solid #d1d5db;border-radius:10px;overflow:hidden;margin-bottom:16px}

td{padding:4px 6px;font-size:13px;color:#1f2937;border-bottom:1px solid #e5e7eb}
.inp{background:#fffde7;border:1.5px solid #f59e0b;border-radius:4px;color:#1f2937;padding:5px 7px;font-size:13px;width:100%}
.inp:focus{border-color:#d97706;box-shadow:0 0 0 2px rgba(217,119,6,.15)}
.inp-num{text-align:center;font-family:'JetBrains Mono',monospace}
.btn{color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;white-space:nowrap}
.bp{background:#1e40af}.bg{background:#059669}.bgr{background:#6b7280}.bo{background:#d97706}.br{background:#dc2626}
.bx{background:#fef2f2;border:1px solid #fca5a5;border-radius:4px;color:#dc2626;width:24px;height:24px;font-size:13px;display:inline-flex;align-items:center;justify-content:center;padding:0}
.bx:hover{background:#dc2626;color:#fff}
.fbar{display:flex;gap:2px;flex-wrap:wrap;padding:10px 12px;border-bottom:1px solid #d1d5db;background:#f9fafb}
.fb{padding:5px 10px;font-size:11px;font-weight:500;border-radius:6px;background:transparent;color:#374151}
.fb.on{font-weight:700;background:#1e40af;color:#fff}
.rg{padding:12px;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.rc{border-radius:8px;padding:12px 14px;position:relative;overflow:hidden;border:1.5px solid #e5e7eb;background:#f9fafb}
.rc .bar{position:absolute;top:0;left:0;right:0;height:3px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#065f46;color:#fff;padding:8px 20px;border-radius:8px;font-size:12px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.2);opacity:0;transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fi{padding:10px 12px;background:#e5e7eb;border-radius:8px;display:flex;flex-wrap:wrap;gap:4px 16px;font-size:11px;color:#374151;font-weight:500}
.tp{display:none}.tp.on{display:block}
.tb{padding:10px 12px;border-top:1px solid #d1d5db;display:flex;gap:6px;background:#f9fafb;flex-wrap:wrap}
.sc{background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:20px;margin-bottom:16px}
.sc h3{font-size:15px;font-weight:700;margin-bottom:6px}.sc p{font-size:12px;color:#6b7280;line-height:1.6;margin-bottom:12px}
.sr{display:flex;gap:8px;flex-wrap:wrap}
@media(max-width:640px){

.btn{padding:6px 10px;font-size:11px}.fb{font-size:10px;padding:4px 8px}

// === DOM helper ===
function h(tag,at){
  var el=document.createElement(tag);
  if(at){for(var k in at){if(!at.hasOwnProperty(k))continue;var v=at[k];
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.indexOf("on")===0)el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="disabled")el.disabled=!!v;
    else if(k==="selected")el.selected=!!v;
    else if(k==="value")el.value=v;
    else if(v!==false&&v!=null)el.setAttribute(k,v);
  }}
  for(var i=2;i<arguments.length;i++){var c=arguments[i];if(c==null)continue;
    if(Array.isArray(c)){for(var j=0;j<c.length;j++){if(c[j]!=null)el.append(typeof c[j]==="object"?c[j]:String(c[j]));}}
    else el.append(typeof c==="object"?c:String(c));
  }
  return el;
}

// === TAB SWITCHING ===
var currentTab="calc";
function renderTab(){
  if(currentTab==="calc")renderCalc();
  else if(currentTab==="cables")renderCables();
  else if(currentTab==="conduits")renderConduits();
  else if(currentTab==="sync")renderSync();
}
document.querySelectorAll(".top-tab").forEach(function(btn){
  btn.addEventListener("click",function(){
    document.querySelectorAll(".top-tab").forEach(function(b){b.classList.remove("active");});
    document.querySelectorAll(".tp").forEach(function(p){p.classList.remove("on");});
    btn.classList.add("active");
    currentTab=btn.dataset.tab;
    document.getElementById("tab-"+currentTab).classList.add("on");
    renderTab();
  });
});

// === INIT ===
init();
renderCalc();
